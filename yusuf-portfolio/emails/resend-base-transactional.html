<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{{subject}}</title>
    <!--
      YusufCreates · Resend template
      — Paste into https://resend.com/templates or send as `html` from the Resend API.
      — Replace {{placeholders}} with Resend template variables or server-side strings.
      — Set {{site_url}} to your real domain (e.g. https://yusufcreates.com).
      — For rich HTML in the body, use Resend triple-mustache {{{body_html}}} if your editor supports it.
      Variables: subject, preheader, heading, body_html, cta_label, cta_url, footer_note, year, site_url
      Hide the CTA row in your editor if you do not need a button (remove the table with cta_url).
    -->
    <style type="text/css">
      .preheader {
        display: none !important;
        visibility: hidden;
        opacity: 0;
        color: transparent;
        height: 0;
        width: 0;
        max-height: 0;
        max-width: 0;
        overflow: hidden;
        mso-hide: all;
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      width: 100% !important;
      -webkit-text-size-adjust: 100%;
      background-color: #000000;
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
    "
  >
    <span class="preheader">{{preheader}}</span>
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #000000; padding: 32px 16px">
      <tr>
        <td align="center">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="100%"
            style="max-width: 560px; border-radius: 16px; overflow: hidden"
          >
            <tr>
              <td
                style="
                  padding: 24px 28px 20px;
                  background: linear-gradient(160deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
                  border: 1px solid rgba(255, 255, 255, 0.12);
                  border-bottom: none;
                  border-radius: 16px 16px 0 0;
                "
              >
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td>
                      <p
                        style="
                          margin: 0 0 4px;
                          font-size: 11px;
                          letter-spacing: 0.12em;
                          text-transform: uppercase;
                          color: rgba(255, 255, 255, 0.45);
                        "
                      >
                        YusufCreates
                      </p>
                      <p
                        style="
                          margin: 0;
                          font-size: 20px;
                          font-weight: 600;
                          letter-spacing: -0.02em;
                          color: #ffffff;
                        "
                      >
                        {{heading}}
                      </p>
                    </td>
                    <td width="48" align="right" valign="top">
                      <div
                        style="
                          width: 40px;
                          height: 40px;
                          border-radius: 10px;
                          border: 1px solid rgba(255, 255, 255, 0.14);
                          background: rgba(255, 255, 255, 0.05);
                          text-align: center;
                          line-height: 40px;
                          font-size: 13px;
                          font-weight: 700;
                          color: #61dafb;
                          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                        "
                      >
                        YC
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 8px 28px 28px;
                  background: rgba(10, 10, 10, 0.95);
                  border: 1px solid rgba(255, 255, 255, 0.1);
                  border-top: 1px solid rgba(97, 218, 251, 0.25);
                  border-radius: 0 0 16px 16px;
                "
              >
                <div
                  style="
                    font-size: 15px;
                    line-height: 1.6;
                    color: rgba(255, 255, 255, 0.88);
                  "
                >
                  {{body_html}}
                </div>

                <!-- Optional CTA: remove the whole table row if unused -->
                <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin-top: 28px">
                  <tr>
                    <td align="center">
                      <a
                        href="{{cta_url}}"
                        style="
                          display: inline-block;
                          padding: 12px 24px;
                          border-radius: 9999px;
                          background: #ffffff;
                          color: #000000;
                          font-size: 14px;
                          font-weight: 600;
                          text-decoration: none;
                        "
                        >{{cta_label}}</a
                      >
                    </td>
                  </tr>
                </table>

                <p
                  style="
                    margin: 28px 0 0;
                    padding-top: 20px;
                    border-top: 1px solid rgba(255, 255, 255, 0.08);
                    font-size: 12px;
                    line-height: 1.5;
                    color: rgba(255, 255, 255, 0.4);
                  "
                >
                  {{footer_note}}
                </p>
                <p style="margin: 16px 0 0; font-size: 11px; color: rgba(255, 255, 255, 0.28)">
                  © {{year}} YusufCreates · Building the web, fast.
                </p>
              </td>
            </tr>
          </table>

          <p style="margin: 24px 0 0; font-size: 11px; color: rgba(255, 255, 255, 0.28); text-align: center">
            You received this because of an action on
            <a href="{{site_url}}" style="color: #61dafb; text-decoration: none">yusufcreates.com</a>.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
